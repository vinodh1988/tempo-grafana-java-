# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  - "/etc/prometheus/alerts.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: "prometheus"

    # metrics_path defaults to '/metrics'
    # scheme defaults to 'http'.

    static_configs:
      - targets: ["localhost:9090"]
       # The label name is added as a label `label_name=<label_value>` to any timeseries scraped from this config.
        labels:
          app: "prometheus"
  - job_name: "node_exporter"
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http

    static_configs:
      - targets: ["34.59.32.12:9200"]
        labels:
          server: "node1-master"
          env: "lab"
          cluster: "grafana-course"

      - targets: ["35.238.173.104:9200"]
        labels:
          server: "node-2"
          env: "lab"
          cluster: "grafana-course"

      - targets: ["34.72.76.217:9200"]
        labels:
          server: "node-3"
          env: "lab"
          cluster: "grafana-course"
  - job_name: "kubernetes_gcp_cluster"
    static_configs:
      - targets: ["34.59.32.12:30080"]
  - job_name: grafana_alerts_exporter
    scrape_interval: 5s
    static_configs:
      - targets:
          - localhost:9108
        labels:
          app: grafana-alerts
          env: demo
  - job_name: "jvm_metrics"
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /actuator/prometheus
    scheme: http

    static_configs:
      - targets: ["40.80.92.169:18081"]
        labels:
          microservice: "order-service"
          env: "dev"


      - targets: ["40.80.92.169:18082"]
        labels:
          microservice: "payment-service"
          env: "dev"


      - targets: ["40.80.92.169:18083"]
        labels:
          server: "inventory-service"
          env: "dev"



version: "3.9"
name: tempo-grafana-java

services:
  order-service:
    build:
      context: ./order-service
    environment:
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=order-service
        -Dotel.resource.attributes=deployment.environment=poc
        -Dotel.exporter.otlp.endpoint=http://tempo:4317
        -Dotel.exporter.otlp.protocol=grpc
        -Dotel.traces.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.logs.exporter=none
        -Dotel.traces.sampler=always_on
        -Dotel.instrumentation.logback-mdc.enabled=true
      PAYMENT_BASE_URL: http://payment-service:8082
      INVENTORY_BASE_URL: http://inventory-service:8083
    ports:
      - "${ORDER_SERVICE_PORT:-8081}:8081"
    depends_on:
      - payment-service
      - inventory-service
      - tempo

  payment-service:
    build:
      context: ./payment-service
    environment:
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=payment-service
        -Dotel.resource.attributes=deployment.environment=poc
        -Dotel.exporter.otlp.endpoint=http://tempo:4317
        -Dotel.exporter.otlp.protocol=grpc
        -Dotel.traces.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.logs.exporter=none
        -Dotel.traces.sampler=always_on
        -Dotel.instrumentation.logback-mdc.enabled=true
    ports:
      - "${PAYMENT_SERVICE_PORT:-8082}:8082"
    depends_on:
      - tempo

  inventory-service:
    build:
      context: ./inventory-service
    environment:
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=inventory-service
        -Dotel.resource.attributes=deployment.environment=poc
        -Dotel.exporter.otlp.endpoint=http://tempo:4317
        -Dotel.exporter.otlp.protocol=grpc
        -Dotel.traces.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.logs.exporter=none
        -Dotel.traces.sampler=always_on
        -Dotel.instrumentation.logback-mdc.enabled=true
    ports:
      - "${INVENTORY_SERVICE_PORT:-8083}:8083"
    depends_on:
      - tempo

  load-generator-service:
    build:
      context: ./load-generator-service
    environment:
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=load-generator-service
        -Dotel.resource.attributes=deployment.environment=poc
        -Dotel.exporter.otlp.endpoint=http://tempo:4317
        -Dotel.exporter.otlp.protocol=grpc
        -Dotel.traces.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.logs.exporter=none
        -Dotel.traces.sampler=always_on
        -Dotel.instrumentation.logback-mdc.enabled=true
      ORDER_BASE_URL: http://order-service:8081
      LOAD_DEFAULT_RPS: ${LOAD_DEFAULT_RPS:-2}
      LOAD_AUTO_ENABLED: ${LOAD_AUTO_ENABLED:-true}
      LOAD_AUTO_START_DELAY_MS: ${LOAD_AUTO_START_DELAY_MS:-12000}
    ports:
      - "${LOAD_GENERATOR_PORT:-18084}:8084"
    depends_on:
      - order-service
      - tempo

  tempo:
    image: grafana/tempo:2.6.0
    pull_policy: always
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"
      - "${TEMPO_OTLP_GRPC_PORT:-4317}:4317"
      - "${TEMPO_OTLP_HTTP_PORT:-4318}:4318"

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    ports:
      - "${LOKI_HTTP_PORT:-3100}:3100"

  promtail:
    image: grafana/promtail:3.0.0
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=24h
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - order-service
      - payment-service
      - inventory-service
      - load-generator-service

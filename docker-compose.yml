version: "3.9"

services:
  order-service:
    build:
      context: ./order-service
    container_name: order-service
    environment:
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=order-service
        -Dotel.resource.attributes=deployment.environment=poc
        -Dotel.exporter.otlp.endpoint=http://tempo:4317
        -Dotel.exporter.otlp.protocol=grpc
        -Dotel.traces.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.logs.exporter=none
        -Dotel.traces.sampler=always_on
        -Dotel.instrumentation.logback-mdc.enabled=true
      PAYMENT_BASE_URL: http://payment-service:8082
      INVENTORY_BASE_URL: http://inventory-service:8083
    ports:
      - "8081:8081"
    depends_on:
      - payment-service
      - inventory-service
      - tempo

  payment-service:
    build:
      context: ./payment-service
    container_name: payment-service
    environment:
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=payment-service
        -Dotel.resource.attributes=deployment.environment=poc
        -Dotel.exporter.otlp.endpoint=http://tempo:4317
        -Dotel.exporter.otlp.protocol=grpc
        -Dotel.traces.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.logs.exporter=none
        -Dotel.traces.sampler=always_on
        -Dotel.instrumentation.logback-mdc.enabled=true
    ports:
      - "8082:8082"
    depends_on:
      - tempo

  inventory-service:
    build:
      context: ./inventory-service
    container_name: inventory-service
    environment:
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/otel/opentelemetry-javaagent.jar
        -Dotel.service.name=inventory-service
        -Dotel.resource.attributes=deployment.environment=poc
        -Dotel.exporter.otlp.endpoint=http://tempo:4317
        -Dotel.exporter.otlp.protocol=grpc
        -Dotel.traces.exporter=otlp
        -Dotel.metrics.exporter=none
        -Dotel.logs.exporter=none
        -Dotel.traces.sampler=always_on
        -Dotel.instrumentation.logback-mdc.enabled=true
    ports:
      - "8083:8083"
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: promtail
    command: ["-config.file=/etc/promtail/promtail-config.yaml"]
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki

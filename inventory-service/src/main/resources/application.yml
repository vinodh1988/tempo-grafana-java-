spring:
  application:
    name: inventory-service

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [trace_id=%X{trace_id:-} span_id=%X{span_id:-}] [%thread] %logger{36} - %msg%n"

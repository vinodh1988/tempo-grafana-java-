groups:
  - name: federation-rollups
    rules:
      - record: federated:http_rps:rate1m
        expr: sum by (source_cluster, job) (rate(http_server_requests_seconds_count[1m]))

      - record: federated:http_errors_5xx:rate5m
        expr: sum by (source_cluster, job) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))

      - record: federated:targets_up
        expr: sum by (source_cluster, job) (up)
